<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ZYNTRA Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#f0f2f5;}
.header{background:#0A2540;color:white;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-size:22px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;padding:20px;}
.stat{background:white;padding:20px;border-radius:10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.num{font-size:32px;font-weight:bold;color:#1E88E5;}
.label{color:#666;margin-top:5px;font-size:14px;}
.section{background:white;margin:0 20px 20px;border-radius:10px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.section h2{color:#0A2540;margin-bottom:15px;padding-bottom:8px;border-bottom:2px solid #1E88E5;}
table{width:100%;border-collapse:collapse;}
th{background:#0A2540;color:white;padding:10px;text-align:left;}
td{padding:10px;border-bottom:1px solid #eee;}
.badge{padding:4px 10px;border-radius:10px;font-size:12px;font-weight:bold;display:inline-block;}
.badge-prep{background:#fff3cd;color:#856404;}
.badge-livraison{background:#cfe2ff;color:#0a367a;}
.badge-livree{background:#d1e7dd;color:#0a3622;}
.badge-annulee{background:#f8d7da;color:#842029;}
select{padding:6px 10px;border-radius:6px;border:1px solid #ddd;background:white;cursor:pointer;font-size:13px;}
select:focus{outline:none;border-color:#1E88E5;}
.toast{position:fixed;bottom:20px;right:20px;background:#0A2540;color:white;padding:12px 20px;border-radius:8px;display:none;font-size:14px;z-index:999;}
</style>
</head>
<body>

<div class="header">
  <h1>⚡ ZYNTRA — Dashboard Admin</h1>
  <span id="dt"></span>
</div>

<div class="stats">
  <div class="stat"><div class="num" id="tc">0</div><div class="label">Commandes</div></div>
  <div class="stat"><div class="num" id="ca">0</div><div class="label">CA (FCFA)</div></div>
  <div class="stat"><div class="num" id="cl">0</div><div class="label">Clients</div></div>
  <div class="stat"><div class="num" id="ep">0</div><div class="label">En préparation</div></div>
</div>

<div class="section">
  <h2>Commandes récentes</h2>
  <table>
    <thead>
      <tr>
        <th>Numéro</th>
        <th>Client</th>
        <th>Total</th>
        <th>Date</th>
        <th>Statut</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tb">
      <tr><td colspan="6" style="text-align:center;color:#999;padding:20px;">Chargement...</td></tr>
    </tbody>
  </table>
</div>

<div class="toast" id="toast">✅ Statut mis à jour</div>

<script>
// Horloge
function ut() { document.getElementById("dt").textContent = new Date().toLocaleString("fr-FR"); }
ut();
setInterval(ut, 1000);

// Toast notification
function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(function() { t.style.display = "none"; }, 2500);
}

// Changer statut — URL relative (pas localhost)
function changerStatut(n, s) {
  fetch("/api/commandes/" + n + "/statut", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ statut: s })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.ok) {
      showToast("✅ Commande " + n + " → " + s);
      charger();
    }
  })
  .catch(function(e) {
    console.log("Erreur:", e);
    showToast("❌ Erreur lors de la mise à jour");
  });
}

// Badge couleur selon statut
function getBadge(statut) {
  var classes = {
    "En preparation": "badge-prep",
    "En livraison":   "badge-livraison",
    "Livree":         "badge-livree",
    "Annulee":        "badge-annulee"
  };
  var cls = classes[statut] || "badge-prep";
  return "<span class='badge " + cls + "'>" + statut + "</span>";
}

// Charger les commandes
function charger() {
  fetch("/api/commandes")
  .then(function(r) { return r.json(); })
  .then(function(d) {
    // Stats
    document.getElementById("tc").textContent = d.length;
    document.getElementById("ca").textContent = d.reduce(function(a, c) { return a + c.total; }, 0).toLocaleString();
    var clients = [];
    d.forEach(function(c) { if (clients.indexOf(c.telephone) === -1) clients.push(c.telephone); });
    document.getElementById("cl").textContent = clients.length;
    document.getElementById("ep").textContent = d.filter(function(c) { return c.statut === "En preparation"; }).length;

    // Tableau
    var tb = document.getElementById("tb");
    if (!d.length) {
      tb.innerHTML = "<tr><td colspan='6' style='text-align:center;color:#999;padding:20px;'>Aucune commande</td></tr>";
      return;
    }

    var html = "";
    for (var i = 0; i < d.length; i++) {
      var c = d[i];
      html += "<tr>";
      html += "<td><strong>" + c.numero + "</strong></td>";
      html += "<td>" + c.telephone + "</td>";
      html += "<td><strong>" + c.total + " FCFA</strong></td>";
      html += "<td>" + c.date + "</td>";
      html += "<td>" + getBadge(c.statut) + "</td>";
      html += "<td>";
      html += "<select onchange='changerStatut(\"" + c.numero + "\", this.value)'>";
      html += "<option value='En preparation'" + (c.statut === "En preparation" ? " selected" : "") + ">En preparation</option>";
      html += "<option value='En livraison'"   + (c.statut === "En livraison"   ? " selected" : "") + ">En livraison</option>";
      html += "<option value='Livree'"         + (c.statut === "Livree"         ? " selected" : "") + ">Livree</option>";
      html += "<option value='Annulee'"        + (c.statut === "Annulee"        ? " selected" : "") + ">Annulee</option>";
      html += "</select>";
      html += "</td>";
      html += "</tr>";
    }
    tb.innerHTML = html;
  })
  .catch(function(e) { console.log("Erreur:", e); });
}

charger();
setInterval(charger, 5000);
</script>
</body>
</html>
